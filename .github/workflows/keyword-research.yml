name: 🔍 双周关键词研究

on:
  schedule:
    - cron: '0 4 1,15 * *'  # 每月1号和15号
  workflow_dispatch:

jobs:
  keyword-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🟢 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装依赖
        run: npm install

      - name: 🔍 关键词研究
        run: node scripts/keyword-research.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 📤 提交关键词数据
        run: |
          git config user.name "🤖 关键词研究员"
          git config user.email "bot@haowu123.com"
          git add data/
          git diff --staged --quiet || (git commit -m "🔍 关键词研究更新: $(date +%Y-%m-%d)" && git push)
