name: 💓 保活（防止60天休眠）

on:
  schedule:
    # 每50天运行一次
    - cron: '0 0 1 */2 *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 💓 心跳提交
        run: |
          git config user.name "🤖 保活机器人"
          git config user.email "bot@haowu123.com"
          date > .keepalive
          git add .keepalive
          git diff --staged --quiet || (git commit -m "💓 keepalive: $(date +%Y-%m-%d)" && git push)
